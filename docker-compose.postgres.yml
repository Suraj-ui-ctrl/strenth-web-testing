services:
  postgres:
    image: postgres:16-alpine
    container_name: bom-tool-postgres
    environment:
      POSTGRES_USER: bom_user
      POSTGRES_PASSWORD: bom_password
      POSTGRES_DB: bom_db
    ports:
      - "5433:5432"
    volumes:
      - bom-tool-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bom_user -d bom_db"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  bom-tool-postgres-data:
